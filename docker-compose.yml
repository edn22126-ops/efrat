version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plms
      POSTGRES_PASSWORD: plms
      POSTGRES_DB: plms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plms"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://plms:plms@db:5432/plms
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-plms-documents}
      SQS_OCR_QUEUE_URL: ${SQS_OCR_QUEUE_URL:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-dev}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build:
      context: ./backend
    command: >
      sh -c "alembic upgrade head"
    environment:
      DATABASE_URL: postgresql://plms:plms@db:5432/plms
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
