name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plms
          POSTGRES_PASSWORD: plms
          POSTGRES_DB: plms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://plms:plms@localhost:5432/plms
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://plms:plms@localhost:5432/plms
          AWS_ACCESS_KEY_ID: ""
          AWS_SECRET_ACCESS_KEY: ""
          S3_BUCKET: plms-test
          SQS_OCR_QUEUE_URL: ""
        run: pytest -v
